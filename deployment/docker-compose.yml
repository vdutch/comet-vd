services:
  comet:
    container_name: comet
    image: g0ldyy/comet
    restart: unless-stopped
    ports:
      - '8001:8000'
    environment:
      DATABASE_TYPE: '${DATABASE_TYPE:-postgresql}'
      # CORREÇÃO: Adicionado o protocolo postgresql://
      DATABASE_URL: '${DATABASE_URL:-postgresql://comet:comet@postgres:5432/comet}'
    env_file:
      - .env
    volumes:
      - 'comet_data:/app/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -qO- http://127.0.0.1:8000/health'
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - comet-network

  postgres:
    container_name: comet-postgres
    image: 'postgres:18-alpine'
    restart: unless-stopped
    environment:
      POSTGRES_USER: comet
      POSTGRES_PASSWORD: comet
      POSTGRES_DB: comet
    command:
      - postgres
      - '-c'
      - shared_buffers=128MB
      - '-c'
      - effective_cache_size=384MB
      - '-c'
      - maintenance_work_mem=64MB
      - '-c'
      - checkpoint_completion_target=0.9
      - '-c'
      - wal_buffers=8MB
      - '-c'
      - random_page_cost=1.1
      - '-c'
      - effective_io_concurrency=200
      - '-c'
      - work_mem=8MB
      - '-c'
      - max_connections=100
    volumes:
      # CORREÇÃO: Apontado para a pasta /data correta do Postgres
      - 'postgres_data:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U comet -d comet'
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - comet-network

# CORREÇÃO: Criação da rede interna e sintaxe limpa dos volumes
networks:
  comet-network:
    driver: bridge

volumes:
  comet_data: {}
  postgres_data: {}
